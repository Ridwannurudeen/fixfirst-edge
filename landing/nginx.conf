server {
    listen 443 ssl;
    server_name edge.gudman.xyz;

    ssl_certificate /etc/letsencrypt/live/edge.gudman.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edge.gudman.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    root /opt/fixfirst-edge/landing;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 512;
}

server {
    listen 80;
    include /etc/nginx/snippets/acme-challenge.conf;
    server_name edge.gudman.xyz;
    return 301 https://$host$request_uri;
}
