<svg width="1200" height="627" viewBox="0 0 1200 627" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="li-grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M 72 0 L 0 0 0 72" fill="none" stroke="#FFFFFF" stroke-opacity="0.02" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="627" fill="#09090B"/>
  <rect width="1200" height="627" fill="url(#li-grid)"/>

  <!-- Header -->
  <g transform="translate(64, 56)">
    <rect x="0" y="0" width="26" height="26" rx="5" fill="none" stroke="#52525B" stroke-width="1.5"/>
    <text x="6" y="19" fill="#E4E4E7" font-family="Inter, sans-serif" font-size="13" font-weight="600">FF</text>
    <text x="42" y="19" fill="#F4F4F5" font-family="Inter, sans-serif" font-size="16" font-weight="600">FixFirst Edge</text>
  </g>
  <text x="1136" y="75" fill="#A1A1AA" font-family="Inter, sans-serif" font-size="13" font-weight="500" text-anchor="end">Offline maintenance copilot</text>

  <!-- Headline -->
  <g font-family="'Instrument Serif', 'Iowan Old Style', 'Times New Roman', serif" fill="#FAFAFA" font-weight="400">
    <text x="64" y="240" font-size="68">Retrieval that stays</text>
    <text x="64" y="318" font-size="68">on the <tspan fill="#A1A1AA" font-style="italic">laptop.</tspan></text>
  </g>

  <!-- Subhead -->
  <g font-family="Inter, sans-serif" fill="#A1A1AA">
    <text x="64" y="380" font-size="17">It's 2:47 AM. A conveyor throws E04. One bar of signal.</text>
    <text x="64" y="404" font-size="17">What the technician does not need right now is the cloud.</text>
  </g>

  <!-- Stats -->
  <g transform="translate(64, 466)" font-family="'JetBrains Mono', ui-monospace, monospace">
    <text x="0" y="0" fill="#F4F4F5" font-size="26" font-weight="600">843ms</text>
    <text x="0" y="22" fill="#71717A" font-size="12">p50 query</text>

    <text x="148" y="0" fill="#F4F4F5" font-size="26" font-weight="600">0 B</text>
    <text x="148" y="22" fill="#71717A" font-size="12">egress</text>

    <text x="262" y="0" fill="#F4F4F5" font-size="26" font-weight="600">$0</text>
    <text x="262" y="22" fill="#71717A" font-size="12">per seat · MIT</text>

    <text x="430" y="0" fill="#F4F4F5" font-size="26" font-weight="600">3</text>
    <text x="430" y="22" fill="#71717A" font-size="12">vectors/doc</text>
  </g>

  <!-- Footer -->
  <text x="64" y="586" fill="#52525B" font-family="Inter, sans-serif" font-size="12">Built on Actian VectorAI DB · Named vectors · Filtered search · Hybrid RRF</text>
  <text x="1136" y="586" fill="#52525B" font-family="Inter, sans-serif" font-size="12" text-anchor="end">edge.gudman.xyz</text>

  <!-- Right-rail: compact trace card -->
  <g transform="translate(760, 120)">
    <rect x="0" y="0" width="376" height="380" rx="10" fill="#0A0A0B" stroke="#27272A"/>
    <rect x="0" y="0" width="376" height="38" fill="#18181B"/>
    <path d="M 0 38 L 376 38" stroke="#27272A"/>
    <text x="16" y="24" fill="#A1A1AA" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11">retrieval trace</text>
    <text x="360" y="24" fill="#71717A" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" text-anchor="end">offline</text>

    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11">
      <text x="16" y="68"  fill="#A1A1AA">tokenize  → <tspan fill="#E4E4E7">[e04, motor, overload]</tspan></text>
      <text x="16" y="92"  fill="#A1A1AA">identify  → <tspan fill="#E4E4E7">codes:[E04]</tspan></text>
      <text x="16" y="116" fill="#A1A1AA">scan      → <tspan fill="#E4E4E7">68 docs</tspan></text>
      <text x="16" y="140" fill="#A1A1AA">rank      → <tspan fill="#E4E4E7">inc:4 part:1 code:1</tspan></text>
      <text x="16" y="164" fill="#F4F4F5">latency   → <tspan fill="#F4F4F5">8.6ms</tspan></text>
      <text x="16" y="188" fill="#F4F4F5">egress    → <tspan fill="#F4F4F5">0 B</tspan></text>
    </g>

    <line x1="16" y1="212" x2="360" y2="212" stroke="#27272A"/>

    <g transform="translate(16, 232)">
      <text x="0" y="0" fill="#71717A" font-family="Inter, sans-serif" font-size="9" font-weight="500" letter-spacing="1.2">MANUAL SECTION</text>
      <text x="0" y="22" fill="#FAFAFA" font-family="Inter, sans-serif" font-size="14" font-weight="600">CX-200 · §4.7 · p.47</text>
      <text x="0" y="42" fill="#A1A1AA" font-family="Inter, sans-serif" font-size="12">Thermal overload relay trips when</text>
      <text x="0" y="60" fill="#A1A1AA" font-family="Inter, sans-serif" font-size="12">drive motor sustains over-current.</text>
    </g>

    <line x1="16" y1="312" x2="360" y2="312" stroke="#27272A"/>

    <g transform="translate(16, 330)">
      <text x="0" y="0" fill="#71717A" font-family="Inter, sans-serif" font-size="9" font-weight="500" letter-spacing="1.2">CANDIDATE PART</text>
      <text x="0" y="22" fill="#FAFAFA" font-family="Inter, sans-serif" font-size="14" font-weight="600">OL-E04-R — Thermal Overload Relay</text>
    </g>
  </g>
</svg>
