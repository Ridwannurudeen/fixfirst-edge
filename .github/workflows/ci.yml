name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime test deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            "fastapi==0.115.0" \
            "pydantic>=2.10,<3" \
            "python-multipart==0.0.12" \
            "httpx==0.27.2" \
            "numpy==2.1.2" \
            "pandas==2.2.3" \
            "python-dotenv==1.0.1" \
            "pillow>=10,<12" \
            "pytest==8.3.3"

      - name: Run backend tests
        working-directory: backend
        env:
          PYTHONPATH: .
        run: pytest -q
