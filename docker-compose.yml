version: "3.9"

services:
  actian:
    image: williamimoh/actian-vectorai-db:latest
    container_name: vectoraidb
    ports:
      - "50051:50051"
    volumes:
      - ./data:/data
    restart: unless-stopped
    stop_grace_period: 2m

  backend:
    build:
      context: ./backend
    environment:
      ACTIAN_HOST: ${ACTIAN_HOST:-actian}
      ACTIAN_PORT: ${ACTIAN_PORT:-50051}
      ACTIAN_API_KEY: ${ACTIAN_API_KEY:-}
      MODEL_CACHE_DIR: ${MODEL_CACHE_DIR:-/workspace/data/processed/models}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    volumes:
      - ./backend:/app
      - ./data:/workspace/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - actian

  frontend:
    profiles: ["full"]
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
